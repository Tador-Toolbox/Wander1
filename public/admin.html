<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wandr Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#0f0f14;color:#e0ddd8;min-height:100vh;}

/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:#1a1a22;border:1px solid #2a2a35;border-radius:20px;padding:40px;width:340px;text-align:center;}
.login-card h1{font-family:'Playfair Display',serif;font-size:28px;color:#fff;margin-bottom:6px;}
.login-card p{font-size:13px;color:#666;margin-bottom:28px;}
.login-card input{width:100%;padding:13px 16px;background:#0f0f14;border:1.5px solid #2a2a35;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;color:#fff;outline:none;margin-bottom:12px;transition:border-color .2s;}
.login-card input:focus{border-color:#5B4FCF;}
.login-card button{width:100%;padding:13px;border:none;border-radius:12px;background:linear-gradient(135deg,#5B4FCF,#764ba2);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;}
.login-card button:hover{opacity:.9;}

/* Main panel */
#mainPanel{display:none;padding:24px;max-width:900px;margin:0 auto;}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #2a2a35;}
.panel-header h1{font-family:'Playfair Display',serif;font-size:24px;color:#fff;}
.panel-header button{background:#1a1a22;border:1px solid #2a2a35;color:#999;border-radius:10px;padding:8px 16px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:#1a1a22;border:1px solid #2a2a35;border-radius:14px;padding:20px;text-align:center;}
.stat-card .num{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#fff;margin-bottom:4px;}
.stat-card .lbl{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.06em;}

/* Users table */
.section-title{font-size:13px;font-weight:700;color:#666;letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px;}
.user-card{background:#1a1a22;border:1px solid #2a2a35;border-radius:14px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.user-card:hover{border-color:#3a3a50;}
.user-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#5B4FCF,#764ba2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden;}
.user-avatar img{width:100%;height:100%;object-fit:cover;}
.user-info{flex:1;min-width:0;}
.user-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;}
.user-email{font-size:12px;color:#666;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-meta{display:flex;gap:10px;flex-wrap:wrap;}
.user-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;}
.badge-verified{background:rgba(26,107,74,.3);color:#34c98a;}
.badge-unverified{background:rgba(200,75,47,.2);color:#ff6b47;}
.badge-places{background:rgba(43,127,191,.2);color:#4a9eff;}
.badge-trips{background:rgba(91,79,207,.2);color:#9b6dff;}
.badge-ai{background:rgba(201,168,76,.2);color:#C9A84C;}
.user-date{font-size:11px;color:#444;flex-shrink:0;}
.btn-delete{background:rgba(200,75,47,.15);border:1.5px solid rgba(200,75,47,.3);color:#ff6b47;border-radius:10px;padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0;transition:all .15s;}
.btn-delete:hover{background:rgba(200,75,47,.35);}
.btn-delete:disabled{opacity:.4;cursor:not-allowed;}

/* Search */
.search-bar{width:100%;padding:12px 16px;background:#1a1a22;border:1.5px solid #2a2a35;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;outline:none;margin-bottom:16px;}
.search-bar:focus{border-color:#5B4FCF;}
.search-bar::placeholder{color:#444;}

/* Toast */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a6b4a;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;}
#toast.err{background:#c84b2f;}

/* Loading */
.loading{text-align:center;padding:40px;color:#444;font-size:14px;}
.empty{text-align:center;padding:40px;color:#444;font-size:14px;}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="login-card">
    <h1>Wandr ✦</h1>
    <p>Admin Panel</p>
    <input type="password" id="pwdInput" placeholder="Admin password" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Enter</button>
    <div id="loginErr" style="color:#ff6b47;font-size:12px;margin-top:10px;"></div>
  </div>
</div>

<!-- Main Panel -->
<div id="mainPanel">
  <div class="panel-header">
    <h1>✦ Wandr Admin</h1>
    <button onclick="logout()">Logout</button>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="num" id="statUsers">—</div><div class="lbl">Users</div></div>
    <div class="stat-card"><div class="num" id="statPlaces">—</div><div class="lbl">Places</div></div>
    <div class="stat-card"><div class="num" id="statTrips">—</div><div class="lbl">Trips</div></div>
  </div>

  <div class="section-title">All Users</div>
  <input type="text" class="search-bar" id="searchInput" placeholder="Search by name, email or @handle…" oninput="filterUsers()">
  <div id="userList"><div class="loading">Loading…</div></div>
</div>

<div id="toast"></div>

<script>
let adminPwd = '';
let allUsers = [];

function login(){
  const pwd = document.getElementById('pwdInput').value;
  if(!pwd){ document.getElementById('loginErr').textContent = 'Enter password'; return; }
  adminPwd = pwd;
  loadPanel();
}

function logout(){
  adminPwd = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainPanel').style.display = 'none';
}

async function loadPanel(){
  try {
    const r = await fetch('/api/admin/stats', { headers: { 'x-admin-password': adminPwd } });
    if(r.status === 401){ document.getElementById('loginErr').textContent = 'Wrong password'; return; }
    const stats = await r.json();
    document.getElementById('statUsers').textContent = stats.users;
    document.getElementById('statPlaces').textContent = stats.places;
    document.getElementById('statTrips').textContent = stats.trips;

    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainPanel').style.display = 'block';

    await loadUsers();
  } catch(e) {
    document.getElementById('loginErr').textContent = 'Connection error';
  }
}

async function loadUsers(){
  document.getElementById('userList').innerHTML = '<div class="loading">Loading users…</div>';
  try {
    const r = await fetch('/api/admin/users', { headers: { 'x-admin-password': adminPwd } });
    allUsers = await r.json();
    renderUsers(allUsers);
  } catch {
    document.getElementById('userList').innerHTML = '<div class="empty">Error loading users</div>';
  }
}

function filterUsers(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allUsers.filter(u =>
    (u.email||'').toLowerCase().includes(q) ||
    (u.firstName||'').toLowerCase().includes(q) ||
    (u.lastName||'').toLowerCase().includes(q) ||
    (u.handle||'').toLowerCase().includes(q)
  );
  renderUsers(filtered);
}

function renderUsers(users){
  if(!users.length){ document.getElementById('userList').innerHTML = '<div class="empty">No users found</div>'; return; }
  document.getElementById('userList').innerHTML = users.map(u => {
    const name = [u.firstName, u.lastName].filter(Boolean).join(' ') || '—';
    const initials = (u.firstName||u.email||'?')[0].toUpperCase();
    const avatar = u.avatar
      ? `<img src="${u.avatar}" alt="">`
      : initials;
    const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : '—';
    const hasAI = u.aiProfile?.analyzedAt;
    return `<div class="user-card" id="uc_${u._id}">
      <div class="user-avatar">${avatar}</div>
      <div class="user-info">
        <div class="user-name">${esc(name)}</div>
        <div class="user-email">${esc(u.email||'')} ${u.handle?'· @'+esc(u.handle):''}</div>
        <div class="user-meta">
          <span class="user-badge ${u.verified?'badge-verified':'badge-unverified'}">${u.verified?'✓ Verified':'Unverified'}</span>
          <span class="user-badge badge-places">📍 ${u.placeCount} places</span>
          <span class="user-badge badge-trips">✈️ ${u.tripCount} trips</span>
          ${hasAI?'<span class="user-badge badge-ai">✦ AI Profile</span>':''}
        </div>
      </div>
      <div class="user-date">${date}</div>
      <button class="btn-delete" onclick="deleteUser('${u._id}','${esc(name)}')">Delete</button>
    </div>`;
  }).join('');
}

async function deleteUser(id, name){
  if(!confirm(`Delete "${name}" and ALL their data?\n\nThis cannot be undone.`)) return;
  const btn = document.querySelector(`#uc_${id} .btn-delete`);
  if(btn) btn.disabled = true;
  try {
    const r = await fetch(`/api/admin/users/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-password': adminPwd }
    });
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    // Remove card from UI
    document.getElementById(`uc_${id}`)?.remove();
    allUsers = allUsers.filter(u => u._id !== id);
    // Update stats
    const statEl = document.getElementById('statUsers');
    if(statEl) statEl.textContent = parseInt(statEl.textContent) - 1;
    toast('Deleted successfully');
  } catch(e) {
    toast(e.message, true);
    if(btn) btn.disabled = false;
  }
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg, isErr=false){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isErr?' err':'');
  setTimeout(()=>t.className='', 2800);
}

// Allow Enter key on password
document.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('pwdInput').focus();
});
</script>
</body>
</html>
