<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password – Wandr</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=Fraunces:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f7f4ef;font-family:'Nunito',sans-serif;padding:20px;}
.card{background:#fff;border-radius:24px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.1);}
.logo{font-family:'Fraunces',serif;font-size:32px;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.logo span{color:#4a9eff;}
h2{font-size:20px;font-weight:800;color:#1a1a2e;margin-bottom:6px;}
p{font-size:13px;font-weight:600;color:#6b6880;margin-bottom:24px;line-height:1.6;}
label{display:block;font-size:11px;font-weight:800;color:#6b6880;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
input{width:100%;padding:13px 16px;background:#f7f4ef;border:2px solid #e8e2d9;border-radius:14px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:#1a1a2e;outline:none;margin-bottom:14px;transition:.2s;}
input:focus{border-color:#4a9eff;}
button{width:100%;padding:14px;background:#4a9eff;color:#fff;border:none;border-radius:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:.2s;margin-top:4px;}
button:hover{background:#2d7dd2;}
button:disabled{opacity:.6;cursor:not-allowed;}
.msg{padding:12px 16px;border-radius:12px;font-size:13px;font-weight:700;margin-bottom:16px;display:none;}
.msg.ok{background:#e6f9f1;color:#34c98a;border:2px solid rgba(52,201,138,.3);}
.msg.err{background:#fff0ec;color:#ff6b47;border:2px solid rgba(255,107,71,.3);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Wandr <span>·</span></div>
  <h2>🔑 Set new password</h2>
  <p>Enter your new password below.</p>
  <div class="msg" id="msg"></div>
  <div>
    <label>New Password</label>
    <input type="password" id="pass" placeholder="At least 6 characters" autocomplete="new-password">
    <label>Confirm Password</label>
    <input type="password" id="pass2" placeholder="Repeat password" autocomplete="new-password">
    <button id="btn" onclick="resetPassword()">Set New Password</button>
  </div>
</div>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) { showMsg('Invalid reset link.', 'err'); document.getElementById('btn').disabled=true; }

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

async function resetPassword() {
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  if (!pass || pass.length < 6) { showMsg('Password must be at least 6 characters', 'err'); return; }
  if (pass !== pass2) { showMsg('Passwords do not match', 'err'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Saving…';
  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pass })
    });
    const data = await res.json();
    if (!res.ok) { showMsg(data.error || 'Error', 'err'); btn.disabled=false; btn.textContent='Set New Password'; return; }
    showMsg('✅ Password changed! Redirecting…', 'ok');
    setTimeout(() => window.location.href = '/', 2000);
  } catch { showMsg('Something went wrong', 'err'); btn.disabled=false; btn.textContent='Set New Password'; }
}
</script>
</body>
</html>
